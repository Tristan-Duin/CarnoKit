# ARK: Survival Ascended - 4-map cluster
#
# Runs The Island, Scorched Earth, Valguero and Lost Colony as clustered containers
# using the maintained mschnitzer/asa-linux-server image (Windows server
# binary via Proton). All tunables come from the sibling .env file.
#
# Start with:   docker compose -p asa-cluster up -d   (see 02-deploy-cluster.sh)
#
# Ports: game ports are published on all interfaces (players connect to
# UDP 7777-7780). RCON is published ONLY on 127.0.0.1 so the bot/watchdog
# can reach it locally - it is never exposed to the internet.
#
# NOTE: ServerAdminPassword is intentionally the LAST ?option. ARK reads a
# password value up to the next space, so any ?option placed after it gets
# folded into the password (an empty ?ServerPassword= will corrupt it). For a
# join password, set ServerPassword in each map's GameUserSettings.ini instead.

services:
  # One-shot init: fix ownership of the bind-mounted data dirs to the
  # in-container server user (uid/gid 25000). Runs before the servers.
  asa-permissions:
    image: alpine:3
    command:
      - sh
      - -c
      - |
        set -eu
        for srv in island scorched valguero lostcolony; do
          mkdir -p "/data/$${srv}/server-files" "/data/$${srv}/steam/compatibilitytools.d" "/data/$${srv}/steamcmd"
          chown -R 25000:25000 "/data/$${srv}"
        done
        mkdir -p /data/cluster-shared
        chown -R 25000:25000 /data/cluster-shared
    user: root
    volumes:
      - ${BASE_DIR}:/data
    restart: "no"

  asa-island:
    image: mschnitzer/asa-linux-server:latest
    container_name: asa-island
    hostname: asa-island
    entrypoint: "/usr/bin/start_server"
    user: gameserver
    tty: true
    restart: unless-stopped
    stop_grace_period: 90s
    environment:
      - ASA_START_PARAMS=TheIsland_WP?listen?Port=${ISLAND_GAME_PORT}?RCONPort=${ISLAND_RCON_PORT}?RCONEnabled=True?MaxPlayers=${MAX_PLAYERS}?ServerAdminPassword=${ADMIN_PASSWORD} -WinLiveMaxPlayers=${MAX_PLAYERS} -clusterid=${CLUSTER_ID} -ClusterDirOverride="/home/gameserver/cluster-shared" -NoTransferFromFiltering -mods=${MODS} -ActiveEvent=Summer -OlympicColors -NoBattlEye
      - ENABLE_DEBUG=0
    ports:
      - "0.0.0.0:${ISLAND_GAME_PORT}:${ISLAND_GAME_PORT}/udp"
      - "127.0.0.1:${ISLAND_RCON_PORT}:${ISLAND_RCON_PORT}/tcp"
    volumes:
      - ${BASE_DIR}/island/steam:/home/gameserver/Steam:rw
      - ${BASE_DIR}/island/steamcmd:/home/gameserver/steamcmd:rw
      - ${BASE_DIR}/island/server-files:/home/gameserver/server-files:rw
      - ${BASE_DIR}/cluster-shared:/home/gameserver/cluster-shared:rw
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      asa-permissions:
        condition: service_completed_successfully
    networks:
      - asa-network

  asa-scorched:
    image: mschnitzer/asa-linux-server:latest
    container_name: asa-scorched
    hostname: asa-scorched
    entrypoint: "/usr/bin/start_server"
    user: gameserver
    tty: true
    restart: unless-stopped
    stop_grace_period: 90s
    environment:
      - ASA_START_PARAMS=ScorchedEarth_WP?listen?Port=${SCORCHED_GAME_PORT}?RCONPort=${SCORCHED_RCON_PORT}?RCONEnabled=True?MaxPlayers=${MAX_PLAYERS}?ServerAdminPassword=${ADMIN_PASSWORD} -WinLiveMaxPlayers=${MAX_PLAYERS} -clusterid=${CLUSTER_ID} -ClusterDirOverride="/home/gameserver/cluster-shared" -NoTransferFromFiltering -mods=${MODS} -ActiveEvent=Summer -OlympicColors -NoBattlEye
      - ENABLE_DEBUG=0
    ports:
      - "0.0.0.0:${SCORCHED_GAME_PORT}:${SCORCHED_GAME_PORT}/udp"
      - "127.0.0.1:${SCORCHED_RCON_PORT}:${SCORCHED_RCON_PORT}/tcp"
    volumes:
      - ${BASE_DIR}/scorched/steam:/home/gameserver/Steam:rw
      - ${BASE_DIR}/scorched/steamcmd:/home/gameserver/steamcmd:rw
      - ${BASE_DIR}/scorched/server-files:/home/gameserver/server-files:rw
      - ${BASE_DIR}/cluster-shared:/home/gameserver/cluster-shared:rw
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      asa-permissions:
        condition: service_completed_successfully
    networks:
      - asa-network

  asa-valguero:
    image: mschnitzer/asa-linux-server:latest
    container_name: asa-valguero
    hostname: asa-valguero
    entrypoint: "/usr/bin/start_server"
    user: gameserver
    tty: true
    restart: unless-stopped
    stop_grace_period: 90s
    environment:
      - ASA_START_PARAMS=Valguero_WP?listen?Port=${VALGUERO_GAME_PORT}?RCONPort=${VALGUERO_RCON_PORT}?RCONEnabled=True?MaxPlayers=${MAX_PLAYERS}?ServerAdminPassword=${ADMIN_PASSWORD} -WinLiveMaxPlayers=${MAX_PLAYERS} -clusterid=${CLUSTER_ID} -ClusterDirOverride="/home/gameserver/cluster-shared" -NoTransferFromFiltering -mods=${MODS} -ActiveEvent=Summer -OlympicColors -NoBattlEye
      - ENABLE_DEBUG=0
    ports:
      - "0.0.0.0:${VALGUERO_GAME_PORT}:${VALGUERO_GAME_PORT}/udp"
      - "127.0.0.1:${VALGUERO_RCON_PORT}:${VALGUERO_RCON_PORT}/tcp"
    volumes:
      - ${BASE_DIR}/valguero/steam:/home/gameserver/Steam:rw
      - ${BASE_DIR}/valguero/steamcmd:/home/gameserver/steamcmd:rw
      - ${BASE_DIR}/valguero/server-files:/home/gameserver/server-files:rw
      - ${BASE_DIR}/cluster-shared:/home/gameserver/cluster-shared:rw
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      asa-permissions:
        condition: service_completed_successfully
    networks:
      - asa-network

  asa-lostcolony:
    image: mschnitzer/asa-linux-server:latest
    container_name: asa-lostcolony
    hostname: asa-lostcolony
    entrypoint: "/usr/bin/start_server"
    user: gameserver
    tty: true
    restart: unless-stopped
    stop_grace_period: 90s

    environment:
      - ASA_START_PARAMS=LostColony_WP?listen?Port=${LOSTCOLONY_GAME_PORT}?RCONPort=${LOSTCOLONY_RCON_PORT}?RCONEnabled=True?MaxPlayers=${MAX_PLAYERS}?ServerAdminPassword=${ADMIN_PASSWORD} -WinLiveMaxPlayers=${MAX_PLAYERS} -clusterid=${CLUSTER_ID} -ClusterDirOverride="/home/gameserver/cluster-shared" -NoTransferFromFiltering -mods=${MODS} -ActiveEvent=Summer -OlympicColors -NoBattlEye
      - ENABLE_DEBUG=0

    ports:
      - "0.0.0.0:${LOSTCOLONY_GAME_PORT}:${LOSTCOLONY_GAME_PORT}/udp"
      - "127.0.0.1:${LOSTCOLONY_RCON_PORT}:${LOSTCOLONY_RCON_PORT}/tcp"

    volumes:
      - ${BASE_DIR}/lostcolony/steam:/home/gameserver/Steam:rw
      - ${BASE_DIR}/lostcolony/steamcmd:/home/gameserver/steamcmd:rw
      - ${BASE_DIR}/lostcolony/server-files:/home/gameserver/server-files:rw
      - ${BASE_DIR}/cluster-shared:/home/gameserver/cluster-shared:rw
      - /etc/localtime:/etc/localtime:ro

    depends_on:
      asa-permissions:
        condition: service_completed_successfully

    networks:
      - asa-network

networks:
  asa-network:
    name: asa-network
    driver: bridge
